<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recipe Generator</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto+Slab:wght@100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>AI Recipe Generator</h1>
        <form>
            <input type="text" placeholder="Enter the main ingredient" required class="input-prompt"
                id="input-prompt-search">
            <input type="submit" value="Search" class="input-search" id="input-search-button">
        </form>
        <h2>The recipe will show up here</h2>

        <footer>

            Coded by <a href="https://github.com/FabianaResstel" target="_blank">Fabiana Resstel</a> | <a
                href="https://github.com/FabianaResstel/ai-generator-recipe" target="_blank">GitHub</a> | <a href="#"
                target="_blank">Netlify</a>
        </footer>
    </div>


    <script src="src/script.js"></script>
</body>

</html>
